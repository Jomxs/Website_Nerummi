<section id="gallery" class="section section--inner" style="padding-top: calc(var(--section-pad-top) + clamp(56px,7vw,68px));">
  <div class="inner-wrap">

    <header class="gallery-hero reveal-left">
      <div class="gallery-hero-left">
        <div class="gallery-hero-eyebrow">— MY PORTFOLIO</div>
        <h2 class="gallery-hero-title">MY<br><em>WORKS</em></h2>
        <p class="gallery-hero-sub">A curated collection of original illustrations, characters &amp; concepts</p>
      </div>
      <div class="gallery-hero-right">
        <div class="gallery-count-ring">
          <span class="gallery-count-num" id="heroCount">—</span>
          <span class="gallery-count-lbl">ARTWORKS</span>
        </div>
      </div>
    </header>

    <div class="filter-bar reveal" id="filterBar">
      <button class="filter-btn active" data-filter="all">ALL</button>
      <button class="filter-btn" data-filter="illustrations">ILLUSTRATIONS</button>
      <button class="filter-btn" data-filter="characters">CHARACTERS</button>
      <button class="filter-btn" data-filter="concepts">CONCEPTS</button>
    </div>

    <div class="gallery-sections" id="gallerySections">
      <div class="gallery-cat-section" data-category="illustrations" id="secIllustrations">
        <div class="cat-header reveal-left">
          <div class="cat-header-arrow"><span class="arrow-chevron">›</span><div class="arrow-line"></div></div>
          <h3 class="cat-title">ILLUSTRATIONS</h3>
          <span class="cat-count" id="countIllustrations">0</span>
        </div>
        <div class="section-grid" id="gridIllustrations"></div>
      </div>
      <div class="gallery-cat-section" data-category="characters" id="secCharacters">
        <div class="cat-header reveal-left">
          <div class="cat-header-arrow"><span class="arrow-chevron">›</span><div class="arrow-line"></div></div>
          <h3 class="cat-title">CHARACTERS</h3>
          <span class="cat-count" id="countCharacters">0</span>
        </div>
        <div class="section-grid" id="gridCharacters"></div>
      </div>
      <div class="gallery-cat-section" data-category="concepts" id="secConcepts">
        <div class="cat-header reveal-left">
          <div class="cat-header-arrow"><span class="arrow-chevron">›</span><div class="arrow-line"></div></div>
          <h3 class="cat-title">CONCEPTS</h3>
          <span class="cat-count" id="countConcepts">0</span>
        </div>
        <div class="section-grid" id="gridConcepts"></div>
      </div>
    </div>

  </div>
</section>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" aria-modal="true" role="dialog" aria-label="Image viewer">
  <div class="lightbox-backdrop" id="lightboxBackdrop"></div>
  <button class="lightbox-close" id="lightboxClose" aria-label="Close">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
  <button class="lightbox-arrow lightbox-prev" id="lightboxPrev" aria-label="Previous">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><polyline points="14 4 7 11 14 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <button class="lightbox-arrow lightbox-next" id="lightboxNext" aria-label="Next">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><polyline points="8 4 15 11 8 18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <div class="lightbox-inner">
    <div class="lightbox-img-wrap">
      <img class="lightbox-img" id="lightboxImg" src="" alt="" draggable="false">
    </div>
    <div class="lightbox-meta">
      <span class="lightbox-label" id="lightboxLabel"></span>
      <span class="lightbox-counter" id="lightboxCounter"></span>
    </div>
  </div>
</div>
